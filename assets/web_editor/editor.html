<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gargo</title>
    <style>
{{EDITOR_CSS}}
{{THEME_CSS}}
{{DIFF_CSS}}
    </style>
  </head>
  <body>
    <header id="header" aria-label="Components">
      <a id="repo-link" target="_blank" rel="noopener" hidden></a>
      <span id="repo-sep" hidden>|</span>
      <button data-component="explorer">Explorer</button>
      <span>|</span>
      <button data-component="history">History</button>
      <span>|</span>
      <button data-component="compare">Compare</button>
      <span>|</span>
      <button data-component="status">Status</button>
      <div id="focus-path" aria-live="polite"></div>
    </header>

    <main id="app" tabindex="-1"></main>
    <div id="toast" role="status" hidden></div>

    <div id="help-backdrop" hidden>
      <section id="help" role="dialog" aria-modal="true" aria-label="Keybindings" tabindex="-1">
        <div id="help-title">Keybindings<span class="grow"></span><span class="help-dismiss">? or Esc to close</span></div>
        <div id="help-body"></div>
      </section>
    </div>

    <div id="commit-backdrop" hidden>
      <section id="commit-dialog" role="dialog" aria-modal="true" aria-label="Commit" tabindex="-1">
        <div id="commit-title">Commit<span class="grow"></span><span id="commit-branch"></span></div>
        <div id="commit-summary"></div>
        <textarea id="commit-message" rows="5" placeholder="Commit message…"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <label id="commit-amend-row" hidden><input type="checkbox" id="commit-amend"> Amend previous commit</label>
        <div id="commit-actions">
          <span id="commit-hint"><span class="key">⌘↵</span> commit · <span class="key">Esc</span> cancel</span>
          <span class="grow"></span>
          <button type="button" id="commit-cancel">Cancel</button>
          <button type="button" id="commit-submit">Commit</button>
        </div>
      </section>
    </div>

    <div id="popup-backdrop" hidden>
      <section id="popup" role="dialog" aria-modal="true" tabindex="-1">
        <div id="popup-title"></div>
        <input id="popup-input" autocomplete="off" autocorrect="off"
          autocapitalize="off" spellcheck="false">
        <div id="popup-main">
          <ol id="popup-list"></ol>
          <div id="popup-preview" hidden></div>
        </div>
        <div id="popup-hint">j/k or arrows to move · Enter to select · Esc to close</div>
      </section>
    </div>

    <script type="module">
{{EDITOR_JS}}
    </script>
  </body>
</html>
